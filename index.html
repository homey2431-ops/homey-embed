<!DOCTYPE html>
<html lang="en">
<head>
    <title>QuickChat</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#232f3e">
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #ed0546;
        }
        #experience-container {
            width: 100%;
            height: 100%;
        }

    <script src="https://unpkg.com/amazon-quicksight-embedding-sdk@2.11.3/dist/quicksight-embedding-js-sdk.min.js"></script>
    <script type="text/javascript">
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const embedQuickChat = async () => {
            const { createEmbeddingContext } = QuickSightEmbedding;
            const embeddingContext = await createEmbeddingContext();

            const frameOptions = {
                url: "https://us-east-1.quicksight.aws.amazon.com/embedding/2b682e4fc1784280ae824f06f6c35994/quick/chat?code=AYABeA7GAXiyyNUBs3or4YD4wTwAAAABAAdhd3Mta21zAEthcm46YXdzOmttczp1cy1lYXN0LTE6MjU5NDgwNDYyMTMyOmtleS81NGYwMjdiYy03MDJhLTQxY2YtYmViNS0xNDViOTExNzFkYzMAuAECAQB42HF-xHeyR8SWG2ci7dp0XHnX-PgsyDaeZAM7ATifPbwBkaMTAwOH6KJjH-r67jlqawAAAH4wfAYJKoZIhvcNAQcGoG8wbQIBADBoBgkqhkiG9w0BBwEwHgYJYIZIAWUDBAEuMBEEDA89fwLKZ32k53c_HwIBEIA7vm0MO5UGWdE_ZHuItStiZXvB-Bp3p5dcWuL_XXTzhWtHsyWFAUJi31-XV5BlQe_MiBFdQnMvAQdyNEgCAAAAAAwAABAAAAAAAAAAAAAAAAAAf-XKJNdws0alcMothI979f____8AAAABAAAAAAAAAAAAAAABAAAAoQGAiMw9InXELBMZy9F1HxoscR98lpTIUnldx-5lL0TyBoI8Qza40cP-2ZfD6hjIWVyqNTMbSDtWZQO4vC5_30y6a7gcvjhhyzosSeGevNgerege4ahUDgTkLAYQ7KQoaYEC9thusKnOHaDHyd9rScPGkI9jQdQq9VEECHMB2sY2Gc5x852D4BMtiQxwwn6GDL4dME9s6P3Xaq66N9BO3A1AWQ9ql1awlwrexRu54PJmLg%3D%3D&identityprovider=quicksight&isauthcode=true",
                container: '#experience-container',
                height: "100%",
                width: "100%",
            };

            const contentOptions = {
                agentOptions: {
                    fixedAgentId: 'f838790c-2151-444b-8600-9bf7f632153e',
                },
                promptOptions: {
                    showPromptArea: true,
                },
                footerOptions: {
                    showBrandAttribution: false,
                },
                onMessage: async (messageEvent) => {
                    switch (messageEvent.eventName) {
                        case 'CONTENT_LOADED':
                            console.log("Quick Chat loaded.");
                            break;
                        case 'ERROR_OCCURRED':
                            console.log("Error:", messageEvent);
                            break;
                    }
                }
            };

            await embeddingContext.embedQuickChat(frameOptions, contentOptions);
        };
    </script>
</head>
<body onload="embedQuickChat()">
    <div id="experience-container"></div>
</body>
</html>
