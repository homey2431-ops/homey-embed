<!DOCTYPE html>
<html lang="en">
<head>
    <title>QuickChat</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#232f3e">
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #ed0546;
        }
        #experience-container {
            width: 100%;
            height: 100%;
        }
    </style>
    <script src="https://unpkg.com/amazon-quicksight-embedding-sdk@2.11.3/dist/quicksight-embedding-js-sdk.min.js"></script>
    <script type="text/javascript">
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        const embedQuickChat = async () => {
            const { createEmbeddingContext } = QuickSightEmbedding;
            const embeddingContext = await createEmbeddingContext();

            const frameOptions = {
                url: "https://us-east-1.quicksight.aws.amazon.com/embedding/11738a274c6747b8b14b350a3ed5fc90/quick/chat?code=AYABeHXmmW4oVizyLXkmDXd0kl8AAAABAAdhd3Mta21zAEthcm46YXdzOmttczp1cy1lYXN0LTE6MjU5NDgwNDYyMTMyOmtleS81NGYwMjdiYy03MDJhLTQxY2YtYmViNS0xNDViOTExNzFkYzMAuAECAQB42HF-xHeyR8SWG2ci7dp0XHnX-PgsyDaeZAM7ATifPbwBAQmnSAV7_YyUqMzUVnRq4wAAAH4wfAYJKoZIhvcNAQcGoG8wbQIBADBoBgkqhkiG9w0BBwEwHgYJYIZIAWUDBAEuMBEEDL7j9K0nHg4Q5mjx8gIBEIA7fyBf6y9BRx-_QnTz1s-GCbmebHvXhu2v_YSMX-OtwuaYsC2fT49YUoB-gZi1aHvOAZXHs5_vuZJh9E8CAAAAAAwAABAAAAAAAAAAAAAAAAAA44_ExJH8pb9m0Zs7JtOBrf____8AAAABAAAAAAAAAAAAAAABAAAAoW-boamRwc0E-076ufYM-xaIkLusI2eRvw_bxRiorIeD1dfMaAlvrROpd5okq87ZTrybsDEqgaEEzzPLFaLAA9TTIUu0GwwVqrbRbxGcFLLhWQuupaCEM9FmMvMMj7ZBhplaVJxQVb9e5yQu3_1B1GIfwq5sl51lXwSBZZU_jvxyegtk-aA5iHfFf34vACLdwC2R4bfBnwJv3VJX7MtyvHGBMRlc_ElGN8QEvQo5Dn39fA%3D%3D&identityprovider=quicksight&isauthcode=true",
                container: '#experience-container',
                height: "100%",
                width: "100%",
            };

            const contentOptions = {
                agentOptions: {
                    fixedAgentId: 'f838790c-2151-444b-8600-9bf7f632153e',
                },
                promptOptions: {
                    showPromptArea: true,
                },
                footerOptions: {
                    showBrandAttribution: false,
                },
                onMessage: async (messageEvent) => {
                    switch (messageEvent.eventName) {
                        case 'CONTENT_LOADED':
                            console.log("Quick Chat loaded.");
                            break;
                        case 'ERROR_OCCURRED':
                            console.log("Error:", messageEvent);
                            break;
                    }
                }
            };

            await embeddingContext.embedQuickChat(frameOptions, contentOptions);
        };
    </script>
</head>
<body onload="embedQuickChat()">
    <div id="experience-container"></div>
</body>
</html>
